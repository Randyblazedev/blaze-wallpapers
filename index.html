<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Blaze Wallpapers — Unlimited HD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #080810; color: #fff; min-height: 100vh; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #080810; }
    ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 3px; }

    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(8,8,16,.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .logo { font-size: 1.05rem; font-weight: 800; background: linear-gradient(135deg,#fff,#a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -.3px; }
    .nav a { color: #52525b; text-decoration: none; font-size: .75rem; font-weight: 500; transition: color .2s; }
    .nav a:hover { color: #a78bfa; }

    .hero { padding: 90px 20px 36px; text-align: center; background: linear-gradient(180deg,#080810,#100b20,#080810); }
    .hero h1 { font-size: 2.8rem; font-weight: 900; background: linear-gradient(135deg,#fff,#a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; line-height: 1.1; }
    .hero p { color: #52525b; font-size: .9rem; margin: 8px auto 18px; }
    .search-wrap { max-width: 380px; margin: 0 auto; position: relative; }
    .search-wrap input {
      width: 100%; padding: 11px 16px 11px 40px; border-radius: 12px; font-size: .85rem;
      border: 1px solid rgba(255,255,255,.06); background: rgba(255,255,255,.04); color: #fff;
      outline: none; font-family: 'Inter', sans-serif; transition: border-color .25s;
    }
    .search-wrap input:focus { border-color: #7c3aed; }
    .search-wrap .si { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #3f3f46; font-size: 1rem; }
    .chips { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; margin: 14px auto 0; max-width: 520px; }
    .chip {
      padding: 4px 12px; border-radius: 50px; font-size: .7rem; font-weight: 500;
      border: 1px solid rgba(255,255,255,.05); background: rgba(255,255,255,.03);
      color: #52525b; cursor: pointer; transition: all .2s; user-select: none;
    }
    .chip:hover { border-color: rgba(124,58,237,.3); color: #a78bfa; }
    .chip.on { background: #7c3aed; border-color: #7c3aed; color: #fff; }
    .info { text-align: center; font-size: .7rem; color: #3f3f46; margin-top: 10px; }
    .info b { color: #a78bfa; font-weight: 600; }

    .gallery { max-width: 1200px; margin: 0 auto; padding: 20px 12px 10px; }
    .masonry { column-count: 4; column-gap: 10px; }
    .masonry .item {
      break-inside: avoid; margin-bottom: 10px; position: relative;
      border-radius: 10px; overflow: hidden; cursor: pointer;
      background: #12121e; transition: all .25s; border: 1px solid rgba(255,255,255,.03);
    }
    .masonry .item:hover { transform: translateY(-2px); border-color: rgba(124,58,237,.2); box-shadow: 0 8px 24px rgba(124,58,237,.1); }
    .masonry .item img { width: 100%; height: auto; display: block; transition: transform .4s; }
    .masonry .item:hover img { transform: scale(1.03); }
    .masonry .item .ov {
      position: absolute; inset: 0; background: linear-gradient(0deg,rgba(0,0,0,.65) 0%,transparent 40%);
      opacity: 0; transition: opacity .2s; display: flex; flex-direction: column;
      justify-content: flex-end; padding: 10px;
    }
    .masonry .item:hover .ov { opacity: 1; }
    .masonry .item .cat { font-size: .6rem; color: #a78bfa; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
    .masonry .item .dl-btn {
      margin-top: 4px; background: rgba(124,58,237,.9); color: #fff; border: none;
      border-radius: 6px; padding: 5px 10px; font-size: .65rem; font-weight: 600;
      cursor: pointer; transition: all .2s; width: fit-content;
    }
    .masonry .item .dl-btn:hover { background: #7c3aed; }

    .load-more { text-align: center; padding: 24px 0 32px; }
    .load-more button {
      background: rgba(124,58,237,.12); border: 1px solid rgba(124,58,237,.25); color: #a78bfa;
      padding: 10px 32px; border-radius: 50px; font-weight: 600; font-size: .8rem;
      cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif;
    }
    .load-more button:hover { background: rgba(124,58,237,.2); transform: translateY(-1px); }

    .full {
      position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .25s; padding: 16px;
    }
    .full.on { opacity: 1; pointer-events: auto; }
    .full img { max-width: 100%; max-height: 88vh; border-radius: 8px; object-fit: contain; }
    .full .close {
      position: absolute; top: 16px; right: 18px; color: #fff; font-size: 1.4rem;
      cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center;
      justify-content: center; border-radius: 50%; background: rgba(255,255,255,.08);
      border: none; transition: background .2s;
    }
    .full .close:hover { background: rgba(255,255,255,.15); }
    .full .down {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #7c3aed; color: #fff; border: none; border-radius: 50px;
      padding: 10px 28px; font-weight: 600; font-size: .8rem; cursor: pointer;
      transition: all .2s; font-family: 'Inter', sans-serif;
    }
    .full .down:hover { background: #6d28d9; transform: translateX(-50%) translateY(-1px); }

    footer { text-align: center; padding: 18px; color: #3f3f46; font-size: .7rem; border-top: 1px solid rgba(255,255,255,.03); }
    footer a { color: #a78bfa; text-decoration: none; font-weight: 500; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { width: 18px; height: 18px; border: 2px solid rgba(124,58,237,.2); border-top-color: #7c3aed; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; vertical-align: middle; }

    @media (max-width: 900px) { .masonry { column-count: 3; } }
    @media (max-width: 640px) { .hero h1 { font-size: 1.9rem; } .masonry { column-count: 2; column-gap: 8px; } .masonry .item { margin-bottom: 8px; } }
    @media (max-width: 400px) { .masonry { column-count: 2; } }
  </style>
</head>
<body>
  <nav class="nav">
    <img src="logo.png" alt="blaze wallpapers logo" style="height:32px;width:32px;object-fit:contain;vertical-align:middle;margin-right:8px">
    <span class="logo">✦ Blaze Wallpapers</span>
    <a href="https://github.com/Randyblazedev" target="_blank">RandyBlazedev</a>
  </nav>

  <section class="hero">
    <h1>✦ Blaze Wallpapers</h1>
    <p>Unlimited HD · direct download · no redirects</p>
    <div class="search-wrap">
      <span class="si">⌕</span>
      <input type="text" id="s" placeholder="Search..." oninput="doSearch()">
    </div>
    <div class="chips" id="chips"></div>
    <div class="info"><b id="count">0</b> wallpapers</div>
  </section>

  <section class="gallery">
    <div class="masonry" id="grid"></div>
    <div class="load-more" id="lm"><button onclick="loadMore()">Load more ✦</button></div>
  </section>

  <footer>
    <p>&copy; 2026 — <a href="https://github.com/Randyblazedev" target="_blank">RandyBlazedev</a></p>
  </footer>

  <div class="full" id="full" onclick="if(event.target===this)closeF()">
    <button class="close" onclick="closeF()">✕</button>
    <img id="fi" src="" alt="">
    <button class="down" id="fd">⬇ Download</button>
  </div>

  <script>
    const CATS = ['all', 'abstract', 'nature', 'city', 'space', 'tech', 'dark', 'minimal', 'neon', 'ocean', 'animals', 'architecture', 'textures', 'gradient'];
    let WALLS = [];
    let page = 1;
    let busy = false;
    let curCat = 'all';
    let q = '';
    const PER = 30;

    async function fetchPage(p) {
      try {
        const r = await fetch(`https://picsum.photos/v2/list?page=${p}&limit=${PER}`);
        if (!r.ok) return [];
        return await r.json();
      } catch { return []; }
    }

    function pickCat(i) { return CATS[1 + (i % (CATS.length - 1))]; }

    // Random aspect ratio for masonry variety (taller or shorter)
    function getSize(id) {
      // Use id to consistently get the same size
      const seed = id % 90;
      if (seed < 30) return { w: 400, h: 500 + (seed * 10) };
      if (seed < 60) return { w: 400, h: 600 + (seed * 5) };
      return { w: 400, h: 700 + (seed * 3) };
    }

    async function loadMore(append = true) {
      if (busy) return;
      busy = true;
      const btn = document.querySelector('#lm button');
      if (btn) btn.innerHTML = '<span class="spin"></span>';

      const items = await fetchPage(page);
      if (!items.length) { if (btn) btn.textContent = 'All loaded ✦'; busy = false; return; }

      const mapped = items.map((item, i) => {
        const sz = getSize(item.id);
        return {
          id: item.id,
          url: `https://picsum.photos/id/${item.id}/${sz.w}/${sz.h}`,
          thumb: `https://picsum.photos/id/${item.id}/${Math.round(sz.w/2)}/${Math.round(sz.h/2)}`,
          author: item.author,
          category: pickCat(WALLS.length + i),
          w: sz.w, h: sz.h
        };
      });

      WALLS = append ? [...WALLS, ...mapped] : mapped;
      page++;
      document.getElementById('count').textContent = WALLS.length;
      render();
      busy = false;
      if (btn) btn.innerHTML = 'Load more ✦';
    }

    function filtered() {
      return WALLS.filter(w => {
        const mCat = curCat === 'all' || w.category === curCat;
        const mQ = !q || w.category.includes(q) || String(w.id).includes(q);
        return mCat && mQ;
      });
    }

    function render() {
      const grid = document.getElementById('grid');
      const f = filtered();
      if (!f.length) { grid.innerHTML = '<div style="text-align:center;padding:40px;color:#3f3f46;font-size:.85rem;grid-column:1/-1">no wallpapers found</div>'; return; }
      grid.innerHTML = f.map(w => `
        <div class="item" onclick="preview('${w.url}')">
          <img src="${w.thumb}" alt="" loading="lazy" style="aspect-ratio:${w.w}/${w.h}">
          <div class="ov">
            <span class="cat">${w.category}</span>
            <button class="dl-btn" onclick="event.stopPropagation();dlWall('${w.url}')">⬇ Download</button>
          </div>
        </div>
      `).join('');
    }

    function doSearch() { q = document.getElementById('s').value.toLowerCase(); render(); }

    function setCat(c) {
      curCat = c;
      document.querySelectorAll('.chip').forEach(el => el.classList.toggle('on', el.dataset.c === c));
      render();
    }

    function renderCats() {
      document.getElementById('chips').innerHTML = CATS.map(c =>
        `<span class="chip ${c === 'all' ? 'on' : ''}" data-c="${c}" onclick="setCat('${c}')">${c}</span>`
      ).join('');
    }

    // Direct download - no redirect guaranteed
    async function dlWall(url) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = url;
      await new Promise((res, rej) => { img.onload = res; img.onerror = rej; });
      const c = document.createElement('canvas');
      c.width = img.naturalWidth;
      c.height = img.naturalHeight;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const a = document.createElement('a');
      a.href = c.toDataURL('image/jpeg', 0.92);
      a.download = 'blaze-' + Date.now() + '.jpg';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    let curUrl = '';
    function preview(url) {
      curUrl = url; document.getElementById('fi').src = url;
      document.getElementById('fd').onclick = () => dlWall(url);
      document.getElementById('full').classList.add('on');
      document.body.style.overflow = 'hidden';
    }
    function closeF() { document.getElementById('full').classList.remove('on'); document.body.style.overflow = ''; }
    document.addEventListener('keydown', e => e.key === 'Escape' && closeF());

    // infinite scroll
    let ticking = false;
    window.addEventListener('scroll', () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 900) loadMore();
        ticking = false;
      });
    }, { passive: true });

    renderCats();
    loadMore(false);
  </script>
</body>
</html>
