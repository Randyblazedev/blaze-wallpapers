<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blaze Wallpapers — Beautiful Wallpapers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #0a0a0f; color: #fff; }
    .navbar { background: rgba(10,10,15,.85) !important; backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,.05); }
    .navbar-brand { font-weight: 800; font-size: 1.3rem; letter-spacing: -.5px; }
    .hero {
      padding: 80px 0 60px; text-align: center;
      background: linear-gradient(180deg, #0a0a0f, #1a0a2e, #0a0a0f);
    }
    .hero h1 { font-size: 3.5rem; font-weight: 900; background: linear-gradient(135deg, #fff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { color: #94a3b8; max-width: 500px; margin: 12px auto 24px; }
    .search-box { max-width: 480px; margin: 0 auto; position: relative; }
    .search-box input {
      width: 100%; padding: 14px 20px 14px 48px; border-radius: 16px;
      border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.05);
      color: #fff; font-size: .95rem; outline: none; backdrop-filter: blur(10px);
      transition: all .3s; font-family: 'Poppins', sans-serif;
    }
    .search-box input:focus { border-color: #a855f7; box-shadow: 0 0 20px rgba(168,85,247,.15); }
    .search-box .icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 1.2rem; }
    .cats { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
    .cat-chip {
      padding: 6px 18px; border-radius: 50px; font-size: .8rem; font-weight: 500;
      border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.03);
      color: #94a3b8; cursor: pointer; transition: all .2s; text-transform: capitalize;
    }
    .cat-chip:hover, .cat-chip.active { background: #a855f7; border-color: #a855f7; color: #fff; }
    .gallery { padding: 40px 0; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px; max-width: 1200px; margin: 0 auto; padding: 0 16px;
    }
    .wall-card {
      position: relative; border-radius: 16px; overflow: hidden; cursor: pointer;
      aspect-ratio: 9/16; background: #1a1a2e; transition: all .3s;
      border: 1px solid rgba(255,255,255,.05);
    }
    .wall-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(168,85,247,.2); border-color: rgba(168,85,247,.3); }
    .wall-card img { width: 100%; height: 100%; object-fit: cover; transition: all .4s; }
    .wall-card:hover img { transform: scale(1.05); }
    .wall-card .overlay {
      position: absolute; inset: 0; background: linear-gradient(0deg, rgba(0,0,0,.7) 0%, transparent 50%);
      opacity: 0; transition: all .3s; display: flex; flex-direction: column; justify-content: flex-end; padding: 16px;
    }
    .wall-card:hover .overlay { opacity: 1; }
    .wall-card .overlay .tag { font-size: .7rem; color: #a855f7; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .wall-card .overlay .dl-btn {
      background: rgba(168,85,247,.9); color: #fff; border: none; border-radius: 10px;
      padding: 8px 16px; font-size: .8rem; font-weight: 600; cursor: pointer;
      backdrop-filter: blur(10px); transition: all .2s; margin-top: 8px; width: fit-content;
    }
    .wall-card .overlay .dl-btn:hover { background: #a855f7; transform: scale(1.05); }
    .load-more { text-align: center; padding: 40px; }
    .load-more button {
      background: rgba(168,85,247,.1); border: 1px solid rgba(168,85,247,.3); color: #a855f7;
      padding: 12px 40px; border-radius: 50px; font-weight: 600; cursor: pointer;
      transition: all .2s; font-size: .9rem;
    }
    .load-more button:hover { background: rgba(168,85,247,.2); }
    footer { text-align: center; padding: 24px; color: #64748b; font-size: .8rem; border-top: 1px solid rgba(255,255,255,.05); }
    footer a { color: #a855f7; text-decoration: none; }
    .fullscreen {
      position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 9999;
      display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none;
      transition: opacity .3s; padding: 24px;
    }
    .fullscreen.open { opacity: 1; pointer-events: auto; }
    .fullscreen img { max-width: 100%; max-height: 90vh; border-radius: 12px; object-fit: contain; }
    .fullscreen .close {
      position: absolute; top: 20px; right: 24px; color: #fff; font-size: 2rem;
      cursor: pointer; width: 44px; height: 44px; display: flex; align-items: center;
      justify-content: center; border-radius: 50%; background: rgba(255,255,255,.1);
      transition: all .2s; border: none;
    }
    .fullscreen .close:hover { background: rgba(255,255,255,.2); }
    .fullscreen .dl-full {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #a855f7; color: #fff; border: none; border-radius: 50px;
      padding: 12px 36px; font-weight: 600; cursor: pointer; font-size: .9rem;
      transition: all .2s;
    }
    .fullscreen .dl-full:hover { background: #9333ea; transform: translateX(-50%) scale(1.05); }
    @media (max-width: 640px) {
      .hero h1 { font-size: 2.2rem; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark px-4">
    <a class="navbar-brand" href="#">🔥 Blaze Wallpapers</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link active" href="#">Home</a>
      <a class="nav-link" href="https://github.com/Randyblazedev/blaze-wallpapers" target="_blank">GitHub</a>
    </div>
  </nav>

  <section class="hero">
    <h1>🔥 Blaze Wallpapers</h1>
    <p>Beautiful, high-quality wallpapers for your phone and desktop</p>
    <div class="search-box">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search wallpapers..." oninput="filterWallpapers()">
    </div>
    <div class="cats" id="catChips"></div>
  </section>

  <section class="gallery">
    <div class="grid" id="wallGrid"></div>
    <div class="load-more" id="loadMoreWrap">
      <button onclick="loadMore()">Load More 🔥</button>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Blaze Wallpapers — Built by <a href="https://github.com/Randyblazedev" target="_blank">RandyBlazedev</a></p>
  </footer>

  <div class="fullscreen" id="fullscreen" onclick="if(event.target===this)closeFull()">
    <button class="close" onclick="closeFull()">✕</button>
    <img id="fsImg" src="" alt="">
    <button class="dl-full" id="fsDlBtn">⬇ Download</button>
  </div>

  <script>
    // Free wallpaper collection from picsum.photos (free, no API key needed)
    const CATEGORIES = ['abstract', 'nature', 'city', 'space', 'tech', 'dark', 'gradient', 'minimal', 'neon', 'ocean'];
    
    // Generate wallpaper objects with picsum.photos (free stock photos)
    const WALLS = [];
    for (let i = 0; i < 60; i++) {
      const w = 400 + Math.floor(Math.random() * 200);
      const h = 700 + Math.floor(Math.random() * 300);
      const cat = CATEGORIES[i % CATEGORIES.length];
      WALLS.push({
        id: 'wall-' + i,
        url: `https://picsum.photos/seed/wall${i}/${w}/${h}`,
        thumb: `https://picsum.photos/seed/wall${i}/400/700`,
        category: cat,
        title: cat.charAt(0).toUpperCase() + cat.slice(1) + ' ' + (i + 1)
      });
    }

    let displayCount = 12;
    let activeCat = 'all';
    let searchQ = '';

    function getCats() {
      const all = ['all', ...new Set(WALLS.map(w => w.category))];
      return all;
    }

    function renderCats() {
      const el = document.getElementById('catChips');
      el.innerHTML = getCats().map(c => 
        `<span class="cat-chip ${c === activeCat ? 'active' : ''}" onclick="setCat('${c}')">${c}</span>`
      ).join('');
    }

    function setCat(c) {
      activeCat = c;
      displayCount = 12;
      renderCats();
      renderGrid();
    }

    function filterWallpapers() {
      searchQ = document.getElementById('searchInput').value.toLowerCase();
      displayCount = 12;
      renderGrid();
    }

    function getFiltered() {
      return WALLS.filter(w => {
        const matchCat = activeCat === 'all' || w.category === activeCat;
        const matchSearch = !searchQ || w.title.toLowerCase().includes(searchQ) || w.category.includes(searchQ);
        return matchCat && matchSearch;
      });
    }

    function renderGrid() {
      const grid = document.getElementById('wallGrid');
      const filtered = getFiltered();
      const shown = filtered.slice(0, displayCount);

      if (shown.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#64748b">No wallpapers found 😕</div>';
        document.getElementById('loadMoreWrap').style.display = 'none';
        return;
      }

      grid.innerHTML = shown.map(w => `
        <div class="wall-card" onclick="openFull('${w.url}')">
          <img src="${w.thumb}" alt="${w.title}" loading="lazy">
          <div class="overlay">
            <span class="tag">${w.category}</span>
            <button class="dl-btn" onclick="event.stopPropagation();downloadWall('${w.url}')">⬇ Download</button>
          </div>
        </div>
      `).join('');

      document.getElementById('loadMoreWrap').style.display = displayCount >= filtered.length ? 'none' : 'block';
    }

    function loadMore() {
      displayCount += 12;
      renderGrid();
    }

    let currentFullUrl = '';

    function openFull(url) {
      currentFullUrl = url;
      document.getElementById('fsImg').src = url;
      document.getElementById('fsDlBtn').onclick = () => downloadWall(url);
      document.getElementById('fullscreen').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeFull() {
      document.getElementById('fullscreen').classList.remove('open');
      document.body.style.overflow = '';
    }

    function downloadWall(url) {
      const a = document.createElement('a');
      a.href = url;
      a.download = 'blaze-wallpaper-' + Date.now() + '.jpg';
      a.target = '_blank';
      a.click();
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeFull();
    });

    renderCats();
    renderGrid();
  </script>
</body>
</html>
